    <title>Hieroja</title>
    
    <!-- Critical CSS inline (lisää tarvittaessa) -->
    <style>
      /* Perusnollaus ja latausspinnerin tyylit. Fontit hoitaa Tailwind. */
      body {
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #E73725;
      }
      @media (min-width: 768px) {
        body {
          background-color: #FFFFFF;
        }
      }

      /* Prevent layout shift during loading */
      #root {
        min-height: 100vh;
        background-color: #FFFFFF;
      }
      
      /* Loading spinner for better UX */
      .loading-spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
      }
      
      /* Prevent horizontal scroll */
      html, body {
        overflow-x: hidden;
        width: 100%;
      }
      
      /* Ensure touch targets are accessible */
      @media (max-width: 767px) {
        button, a, input[type="button"], input[type="submit"] {
          min-height: 44px;
          min-width: 44px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading fallback -->
      <div class="loading-spinner">
        <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #E73725; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Add animation for loading spinner -->
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </body>
</html>
